<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Freedom Countdown ⛏️🎉</title>

<!-- PWA -->
<link rel="manifest" href="/manifest.json"/>
<meta name="theme-color" content="#1a0533"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Freedom!"/>
<link rel="apple-touch-icon" href="/icon-192.png"/>

<link href="https://fonts.googleapis.com/css2?family=Righteous&family=Lora:ital@0;1&display=swap" rel="stylesheet"/>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold:   #FFD700;
    --pink:   #FF6B9D;
    --cyan:   #00F5FF;
    --purple: #BF5FFF;
    --green:  #39FF14;
    --orange: #FF6B6B;
  }

  body {
    min-height: 100vh;
    background: #0a0015;
    font-family: sans-serif;
    overflow-x: hidden;
  }

  /* ── NEON ORBS ── */
  .neon-bg { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
  .neon-orb {
    position: absolute; border-radius: 50%; filter: blur(80px);
    animation: orbPulse var(--dur, 5s) ease-in-out infinite alternate;
  }
  @keyframes orbPulse {
    from { opacity: 0.2; transform: scale(0.88); }
    to   { opacity: 0.6; transform: scale(1.18); }
  }

  /* Sweeping beam */
  .light-beam {
    position: fixed; top: 0; left: -50%; width: 35%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(191,95,255,0.06), transparent);
    animation: beamSweep 7s linear infinite;
    pointer-events: none; z-index: 0;
  }
  @keyframes beamSweep { from { left: -50%; } to { left: 130%; } }

  /* Floor glow line */
  .glow-line {
    position: fixed; bottom: 0; left: 0; right: 0; height: 2px;
    pointer-events: none; z-index: 0;
    animation: lineFlicker 2.5s ease-in-out infinite alternate;
  }
  @keyframes lineFlicker {
    from { opacity: 0.4; }
    to   { opacity: 1; box-shadow: 0 0 24px 4px var(--cyan); }
  }

  /* ── CONFETTI ── */
  .piece {
    position: fixed; top: -20px; pointer-events: none; z-index: 0;
    animation: fall linear infinite;
  }
  @keyframes fall {
    from { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    to   { transform: translateY(110vh) rotate(720deg); opacity: 0.15; }
  }

  /* ── NEON BORDER PULSE ── */
  @keyframes neonBorder {
    from { box-shadow: 0 0 6px var(--c), 0 0 16px var(--c)44, inset 0 0 6px var(--c)11; }
    to   { box-shadow: 0 0 18px var(--c), 0 0 48px var(--c)77, inset 0 0 14px var(--c)33; }
  }

  /* ── LAYOUT ── */
  .app {
    position: relative; z-index: 1;
    max-width: 680px; margin: 0 auto;
    padding: 44px 18px 90px;
  }

  /* ── HEADER ── */
  .header { text-align: center; margin-bottom: 40px; }
  .header-emoji { font-size: 50px; animation: bounce 2.2s ease-in-out infinite; display: block; }
  @keyframes bounce {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-10px); }
  }
  h1 {
    font-family: 'Righteous', cursive;
    font-size: clamp(26px, 7vw, 52px);
    color: var(--gold); margin: 10px 0 0;
    letter-spacing: 2px;
    animation: titleGlow 3s ease-in-out infinite alternate;
  }
  @keyframes titleGlow {
    from { text-shadow: 0 0 18px var(--gold), 0 0 36px #FF6B9D55, 0 2px 6px #000; }
    to   { text-shadow: 0 0 40px var(--gold), 0 0 80px var(--pink), 0 0 120px var(--purple)55, 0 2px 6px #000; }
  }
  .subtitle { color: rgba(255,255,255,0.45); font-size: 12px; margin-top: 10px; letter-spacing: 3px; text-transform: uppercase; }

  /* ── INSTALL BAR ── */
  .install-bar { text-align: center; margin-bottom: 30px; }
  .btn-install {
    background: linear-gradient(135deg, var(--purple), var(--pink));
    color: #fff; border: none; border-radius: 50px;
    padding: 11px 26px; font-size: 14px; font-weight: 700;
    cursor: pointer; letter-spacing: 1px;
    animation: installGlow 2s ease-in-out infinite alternate;
  }
  @keyframes installGlow {
    from { box-shadow: 0 0 16px var(--purple)77; }
    to   { box-shadow: 0 0 36px var(--purple), 0 0 60px var(--pink)88; }
  }
  .btn-notif {
    background: linear-gradient(135deg, #00c8cc, #00ff88);
    color: #000; border: none; border-radius: 50px;
    padding: 11px 26px; font-size: 14px; font-weight: 700;
    cursor: pointer; letter-spacing: 1px; margin-left: 8px;
    box-shadow: 0 0 16px var(--cyan)55;
  }
  .btn-notif:disabled { opacity: 0.45; cursor: default; box-shadow: none; }
  .notif-status { font-size: 12px; margin-top: 8px; min-height: 18px; color: rgba(255,255,255,0.4); }
  .notif-status.ok  { color: var(--green); }
  .notif-status.err { color: var(--orange); }

  /* ── COUNTDOWN ── */
  .countdown-row { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-bottom: 32px; }
  .time-box {
    display: flex; flex-direction: column; align-items: center;
    background: rgba(255,255,255,0.06); backdrop-filter: blur(14px);
    border-radius: 16px; padding: 15px 18px; min-width: 72px;
    border: 2px solid rgba(255,255,255,0.12);
    --c: var(--cyan);
    animation: neonBorder 2.5s ease-in-out infinite alternate;
  }
  .time-box:nth-child(2) { --c: var(--pink);   animation-delay:.5s; }
  .time-box:nth-child(3) { --c: var(--purple); animation-delay:1s;  }
  .time-box:nth-child(4) { --c: var(--green);  animation-delay:1.5s;}
  .time-val { font-family:'Righteous',cursive; font-size:46px; color:#fff; line-height:1; }
  .time-lbl { font-size:10px; color:rgba(255,255,255,0.55); text-transform:uppercase; letter-spacing:2px; margin-top:5px; }

  /* ── PROGRESS ── */
  .progress-wrap { margin-bottom: 36px; }
  .prog-labels {
    display: flex; justify-content: space-between;
    font-size: 11px; color: rgba(255,255,255,0.4);
    text-transform: uppercase; letter-spacing: 1px; margin-bottom: 7px;
  }
  .prog-labels .pct { color: var(--gold); }
  .prog-track { height: 10px; background: rgba(255,255,255,0.08); border-radius: 99px; overflow:hidden; }
  .prog-fill {
    height: 100%; border-radius: 99px;
    background: linear-gradient(90deg, var(--cyan), var(--pink), var(--gold));
    box-shadow: 0 0 14px var(--pink), 0 0 28px var(--cyan)55;
    animation: fillBright 2s ease-in-out infinite alternate;
    transition: width 1s ease;
  }
  @keyframes fillBright { from{filter:brightness(1)} to{filter:brightness(1.5)} }

  /* ── CARDS ── */
  .cards { display: flex; flex-direction: column; gap: 14px; }
  .card {
    border-radius: 20px; padding: 20px 22px;
    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(14px);
    border: 2px solid var(--c, rgba(255,255,255,.15));
    animation: neonBorder 3.5s ease-in-out infinite alternate;
    transition: transform .2s;
  }
  .card:hover { transform: translateY(-3px); }
  .card-icon  { font-size: 24px; margin-bottom: 7px; }
  .card-title { font-size: 10px; text-transform: uppercase; letter-spacing: 3px; color: var(--c); font-weight: 700; margin-bottom: 9px; }
  .card-body  { font-family: 'Lora',Georgia,serif; font-size: 15px; color: rgba(255,255,255,.9); line-height: 1.65; }
  .card-body strong { color: var(--c); }
  .card-body .sub   { display:block; font-size:13px; opacity:.7; margin-top:2px; }
  .card-body .tag   { display:inline-block; font-size:11px; text-transform:uppercase; letter-spacing:2px; opacity:.6; margin-bottom:6px; font-style:normal; }

  /* ── FREEDOM SCREEN ── */
  .freedom { text-align:center; padding:50px 0; }
  .freedom h2 { font-family:'Righteous',cursive; font-size:44px; color:var(--gold); animation:titleGlow 1s infinite alternate; }
  .freedom p  { color:#fff; font-size:18px; margin-top:16px; }

  /* ── LOADING / ERROR ── */
  .loading { text-align:center; color:rgba(255,255,255,.5); padding:44px; }
  .spin { display:inline-block; font-size:36px; animation:spin 1.4s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .err-box { color:var(--orange); padding:20px; background:rgba(255,107,107,.08); border-radius:14px; border:1px solid rgba(255,107,107,.3); text-align:center; }
  .btn-retry { margin-top:12px; padding:8px 20px; background:var(--orange); color:#fff; border:none; border-radius:8px; cursor:pointer; font-size:14px; }

  /* ── FOOTER ── */
  .footer { text-align:center; margin-top:52px; color:rgba(255,255,255,.2); font-size:13px; }
</style>
</head>
<body>

<div class="neon-bg" id="neonBg"></div>
<div class="light-beam"></div>
<div class="glow-line" style="background:linear-gradient(90deg,transparent,var(--cyan),transparent)"></div>
<div id="confetti"></div>

<div class="app">

  <div class="header">
    <span class="header-emoji">⛏️ 🎉 ⛏️</span>
    <h1>FREEDOM COUNTDOWN</h1>
    <p class="subtitle">Last Day: May 8, 2026 · 5:00 PM</p>
  </div>

  <div class="install-bar" id="installBar" style="display:none">
    <button class="btn-install" id="btnInstall">📲 Add to Home Screen</button>
    <button class="btn-notif"   id="btnNotif">🔔 Daily Reminders</button>
    <div class="notif-status"   id="notifStatus"></div>
  </div>

  <div id="countdownSection">
    <div class="countdown-row" id="countdownRow"></div>
    <div class="progress-wrap"  id="progressWrap"></div>
  </div>

  <div class="freedom" id="freedomScreen" style="display:none">
    <div style="font-size:72px">🎊🥳🎊</div>
    <h2>YOU'RE FREE!!!</h2>
    <p>Dust yourself off and go live your best life, legend. 💎</p>
  </div>

  <div class="loading"  id="loadingEl" style="display:none"><span class="spin">⚙️</span><p style="margin-top:12px">Mining today's wisdom from the depths...</p></div>
  <div class="err-box"  id="errorEl"   style="display:none"><p id="errMsg"></p><button class="btn-retry" onclick="loadContent()">Try Again</button></div>
  <div class="cards"    id="cardsEl"   style="display:none"></div>

  <div class="footer"><div style="font-size:22px;margin-bottom:6px">💎</div>The only gold worth mining is your future</div>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────────────────────────────
const TARGET = new Date('2026-05-08T17:00:00');
const START  = new Date('2026-04-22T00:00:00');
const COLORS  = ['#FFD700','#FF6B9D','#00F5FF','#BF5FFF','#39FF14','#FF6B6B','#FFEAA7','#98FB98'];

// ── SERVICE WORKER ────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(console.warn);
}

// ── NEON ORBS ──────────────────────────────────────────────────────────────
[
  {c:'#BF5FFF',s:500,t:'2%', l:'-8%', d:'5s'},
  {c:'#00F5FF',s:420,t:'18%',l:'68%', d:'7s'},
  {c:'#FF6B9D',s:360,t:'52%',l:'4%',  d:'4s'},
  {c:'#FFD700',s:300,t:'68%',l:'62%', d:'6.5s'},
  {c:'#39FF14',s:260,t:'33%',l:'38%', d:'8s'},
].forEach(o => {
  const d = document.createElement('div');
  d.className = 'neon-orb';
  d.style.cssText = `width:${o.s}px;height:${o.s}px;background:${o.c};top:${o.t};left:${o.l};--dur:${o.d}`;
  document.getElementById('neonBg').appendChild(d);
});

// ── CONFETTI ──────────────────────────────────────────────────────────────
const cf = document.getElementById('confetti');
for (let i = 0; i < 70; i++) {
  const p = document.createElement('div');
  p.className = 'piece';
  const sz = 6 + Math.random() * 10, circle = Math.random() > .5;
  p.style.cssText = `left:${Math.random()*100}%;width:${circle?sz:sz*.6}px;height:${sz}px;background:${COLORS[~~(Math.random()*COLORS.length)]};border-radius:${circle?'50%':'2px'};animation-duration:${3+Math.random()*5}s;animation-delay:${Math.random()*7}s;opacity:.9`;
  cf.appendChild(p);
}

// ── COUNTDOWN ─────────────────────────────────────────────────────────────
function timeLeft() {
  const d = TARGET - new Date();
  if (d <= 0) return null;
  return { days:~~(d/864e5), hours:~~(d%864e5/36e5), minutes:~~(d%36e5/6e4), seconds:~~(d%6e4/1e3) };
}
function pad(n) { return String(n).padStart(2,'0'); }

function tick() {
  const t = timeLeft();
  if (!t) {
    document.getElementById('countdownSection').style.display = 'none';
    document.getElementById('freedomScreen').style.display   = 'block';
    return;
  }
  document.getElementById('countdownRow').innerHTML =
    ['days','hours','minutes','seconds'].map((l,i) =>
      `<div class="time-box" style="animation-delay:${i*.5}s"><span class="time-val">${pad(t[l])}</span><span class="time-lbl">${l}</span></div>`
    ).join('');

  const pct = Math.min(100, Math.max(0, (new Date()-START)/(TARGET-START)*100));
  document.getElementById('progressWrap').innerHTML = `
    <div class="prog-labels"><span>Sentence served</span><span class="pct">${pct.toFixed(1)}% escaped 🚀</span><span>🏁 Freedom</span></div>
    <div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div>`;
}
tick(); setInterval(tick, 1000);

// ── INSTALL PROMPT ────────────────────────────────────────────────────────
let deferred = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault(); deferred = e;
  document.getElementById('installBar').style.display = 'block';
});
window.addEventListener('appinstalled', () => {
  document.getElementById('btnInstall').textContent = '✅ Installed!';
  document.getElementById('btnInstall').disabled = true;
});
// Always show notifications button (even on iOS / already-installed)
setTimeout(() => { document.getElementById('installBar').style.display = 'block'; }, 1500);

document.getElementById('btnInstall').addEventListener('click', async () => {
  if (!deferred) { alert('To install on iOS: tap the Share button then "Add to Home Screen" 📲'); return; }
  deferred.prompt();
  const { outcome } = await deferred.userChoice;
  if (outcome === 'accepted') { document.getElementById('btnInstall').textContent = '✅ Installed!'; document.getElementById('btnInstall').disabled = true; }
  deferred = null;
});

// ── NOTIFICATIONS ─────────────────────────────────────────────────────────
const btnNotif    = document.getElementById('btnNotif');
const notifStatus = document.getElementById('notifStatus');

function scheduleNext() {
  const t = timeLeft();
  if (!t) return;
  const tomorrow9am = new Date(); tomorrow9am.setDate(tomorrow9am.getDate()+1); tomorrow9am.setHours(9,0,0,0);
  const delay = tomorrow9am - new Date();
  setTimeout(() => {
    if (Notification.permission === 'granted') {
      const msgs = [
        `${t.days} days to go! Keep your eyes on the exit shaft! ⛏️`,
        `Just ${t.days} more days! Freedom is practically in your hand! 💎`,
        `${t.days} days left in the mine. You've almost blasted through! 🎉`,
        `T-minus ${t.days} days! Start warming up that victory dance! 🕺`,
      ];
      new Notification('⛏️ Freedom Countdown!', {
        body: msgs[~~(Math.random()*msgs.length)],
        icon: '/icon-192.png', tag: 'freedom-daily', renotify: true, vibrate:[200,100,200]
      });
      scheduleNext();
    }
  }, delay);
}

btnNotif.addEventListener('click', async () => {
  if (!('Notification' in window)) { notifStatus.textContent = "Browser doesn't support notifications."; notifStatus.className='notif-status err'; return; }
  const perm = await Notification.requestPermission();
  if (perm === 'granted') {
    notifStatus.textContent = '✅ Daily reminders set for 9am!'; notifStatus.className = 'notif-status ok';
    btnNotif.textContent = '🔔 Reminders On!'; btnNotif.disabled = true;
    localStorage.setItem('notifsOn','1');
    scheduleNext();
    setTimeout(() => {
      const t = timeLeft();
      new Notification('⛏️ Freedom Countdown ON!', { body:`${t?.days??0} days to go — see you on the other side! 🎊`, icon:'/icon-192.png', tag:'freedom-test' });
    }, 3000);
  } else {
    notifStatus.textContent = 'Notifications blocked. Enable in browser settings.'; notifStatus.className = 'notif-status err';
  }
});

if (localStorage.getItem('notifsOn') === '1' && Notification.permission === 'granted') {
  btnNotif.textContent = '🔔 Reminders On!'; btnNotif.disabled = true;
  notifStatus.textContent = '✅ Daily reminders active at 9am'; notifStatus.className = 'notif-status ok';
  scheduleNext();
}

// ── DAILY CONTENT ──────────────────────────────────────────────────────────
const CARDS = [
  { key:'oneliner',    emoji:'💬', title:"Today's One-Liner",        color:'#FFD700' },
  { key:'song',        emoji:'🎵', title:'Song of the Day',           color:'#00F5FF' },
  { key:'affirmation', emoji:'✨', title:'Words of Affirmation',      color:'#DDA0DD' },
  { key:'legend',      emoji:'🚀', title:'Late Bloomers & Legends',   color:'#FF6B9D' },
  { key:'rockclock',   emoji:'🪨', title:'Rock Bottom? Not Anymore.', color:'#96CEB4' },
];

function todayKey() { const d=new Date(); return `fc-${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`; }

function renderCards(data) {
  document.getElementById('cardsEl').innerHTML = CARDS.map((def,i) => {
    let body = '';
    if (def.key === 'song' && data.song) {
      body = `<strong>${data.song.title}</strong> — ${data.song.artist}<span class="sub">${data.song.reason}</span>`;
    } else if (def.key === 'legend' && data.legend) {
      body = `<em class="tag">${data.legend.former} → ${data.legend.became}</em><strong style="font-size:16px;display:block;margin-bottom:6px">${data.legend.name}</strong>${data.legend.story}`;
    } else {
      body = data[def.key] || '';
    }
    return `<div class="card" style="--c:${def.color};animation-delay:${i*.35}s"><div class="card-icon">${def.emoji}</div><div class="card-title">${def.title}</div><div class="card-body">${body}</div></div>`;
  }).join('');
  document.getElementById('cardsEl').style.display = 'flex';
}

async function loadContent() {
  const key = todayKey();
  try { const c = localStorage.getItem(key); if(c){ renderCards(JSON.parse(c)); return; } } catch{}

  document.getElementById('loadingEl').style.display = 'block';
  document.getElementById('errorEl').style.display   = 'none';
  document.getElementById('cardsEl').style.display   = 'none';

  const days = timeLeft()?.days ?? 0;
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-20250514', max_tokens:1200,
        system:`You are a hilarious warm hype-person helping a geology superintendent count down their last days at a toxic gold mine. They escape to freedom on May 8 2026. Use mining/geology puns where funny. Return ONLY valid JSON, no markdown, no backticks.`,
        messages:[{ role:'user', content:`${days} days remain until freedom. Return JSON with EXACTLY these keys:
"oneliner": punchy hilarious one-liner about escaping a toxic job, geology pun welcome.
"song": {"title":"...","artist":"...","reason":"1-2 funny sentences on why it fits leaving a toxic mine"}
"affirmation": 2-3 warm genuine sentences celebrating their courage and bright future.
"legend": {"name":"a real famous person who made a major career pivot in midlife and found huge success","former":"old role in 3-5 words","became":"what they became in 3-5 words","story":"2-3 accurate inspiring sentences about their transformation"}
"rockclock": short punchy geology/mining pun or joke about freedom.
JSON only.` }]
      })
    });
    const d = await res.json();
    const raw = (d.content||[]).find(b=>b.type==='text')?.text||'';
    const parsed = JSON.parse(raw.replace(/```json|```/g,'').trim());
    localStorage.setItem(key, JSON.stringify(parsed));
    document.getElementById('loadingEl').style.display = 'none';
    renderCards(parsed);
  } catch(e) {
    document.getElementById('loadingEl').style.display = 'none';
    document.getElementById('errMsg').textContent = "Couldn't load today's content. The mine's wifi is acting up again.";
    document.getElementById('errorEl').style.display = 'block';
  }
}

loadContent();
</script>
</body>
</html>
