<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Freedom Countdown ⛏️🎉</title>

<!-- PWA Meta -->
<meta name="theme-color" content="#1a0533"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Freedom!"/>
<meta name="description" content="Counting down to the best day of your career life."/>

<!-- Inline manifest via JS blob (no server needed) -->
<link id="manifest-link" rel="manifest"/>

<!-- Icons (inline SVG as data URI) -->
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%231a0533'/%3E%3Ctext y='.9em' font-size='80' x='10'%3E🎉%3C/text%3E%3C/svg%3E"/>

<link href="https://fonts.googleapis.com/css2?family=Righteous&family=Lora:ital@0;1&display=swap" rel="stylesheet"/>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #FFD700;
    --pink: #FF6B9D;
    --cyan: #00F5FF;
    --purple: #BF5FFF;
    --green: #39FF14;
    --orange: #FF6B6B;
  }

  body {
    min-height: 100vh;
    background: #0a0015;
    font-family: sans-serif;
    overflow-x: hidden;
    position: relative;
  }

  /* ── NEON PARTY LIGHTING ── */
  .neon-bg {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
  }
  .neon-orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    animation: orbPulse var(--dur, 4s) ease-in-out infinite alternate;
  }
  @keyframes orbPulse {
    0%   { opacity: 0.25; transform: scale(0.9); }
    100% { opacity: 0.65; transform: scale(1.15); }
  }

  /* Scanning light beam */
  .light-beam {
    position: fixed; top: 0; left: -40%; width: 30%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(191,95,255,0.07), transparent);
    animation: beamSweep 6s linear infinite;
    pointer-events: none; z-index: 0;
  }
  @keyframes beamSweep {
    0%   { left: -40%; }
    100% { left: 130%; }
  }

  /* Floor glow lines */
  .glow-line {
    position: fixed; bottom: 0; left: 0; right: 0; height: 3px; pointer-events: none; z-index: 0;
    animation: lineFlicker 2s ease-in-out infinite alternate;
  }
  @keyframes lineFlicker {
    0%,100% { opacity: 0.6; }
    50%      { opacity: 1; box-shadow: 0 0 20px 4px var(--cyan); }
  }

  /* Neon border flash on cards */
  @keyframes neonBorder {
    0%,100% { box-shadow: 0 0 8px var(--c), 0 0 20px var(--c)55, inset 0 0 8px var(--c)22; }
    50%      { box-shadow: 0 0 16px var(--c), 0 0 40px var(--c)88, inset 0 0 16px var(--c)44; }
  }

  /* ── CONFETTI ── */
  .confetti-piece {
    position: fixed; top: -20px; pointer-events: none; z-index: 0;
    animation: confettiFall linear infinite;
  }
  @keyframes confettiFall {
    0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0.2; }
  }

  /* ── LAYOUT ── */
  .app {
    position: relative; z-index: 1;
    max-width: 680px; margin: 0 auto;
    padding: 40px 18px 80px;
  }

  /* ── HEADER ── */
  .header { text-align: center; margin-bottom: 40px; }
  .header-icons { font-size: 48px; margin-bottom: 10px; animation: bounce 2s ease-in-out infinite; }
  @keyframes bounce {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-8px); }
  }
  .header h1 {
    font-family: 'Righteous', cursive;
    font-size: clamp(28px, 7vw, 52px);
    color: var(--gold);
    text-shadow: 0 0 20px var(--gold), 0 0 60px #FF6B9D88, 0 2px 4px #000;
    letter-spacing: 2px;
    animation: titleGlow 3s ease-in-out infinite alternate;
  }
  @keyframes titleGlow {
    0%   { text-shadow: 0 0 20px var(--gold), 0 0 40px #FF6B9D66, 0 2px 4px #000; }
    100% { text-shadow: 0 0 40px var(--gold), 0 0 80px var(--pink), 0 0 120px var(--purple)44, 0 2px 4px #000; }
  }
  .header p { color: rgba(255,255,255,0.5); font-size: 13px; margin-top: 8px; letter-spacing: 3px; text-transform: uppercase; }

  /* ── COUNTDOWN BOXES ── */
  .countdown-row {
    display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; margin-bottom: 36px;
  }
  .time-box {
    display: flex; flex-direction: column; align-items: center;
    background: rgba(255,255,255,0.07); backdrop-filter: blur(12px);
    border-radius: 16px; padding: 16px 20px; min-width: 76px;
    border: 2px solid rgba(255,255,255,0.15);
    --c: var(--cyan);
    animation: neonBorder 2.5s ease-in-out infinite;
  }
  .time-box:nth-child(2) { --c: var(--pink); animation-delay: 0.6s; }
  .time-box:nth-child(3) { --c: var(--purple); animation-delay: 1.2s; }
  .time-box:nth-child(4) { --c: var(--green); animation-delay: 1.8s; }
  .time-val {
    font-family: 'Righteous', cursive;
    font-size: 48px; color: #fff; line-height: 1;
    text-shadow: 0 0 15px currentColor;
  }
  .time-lbl { font-size: 10px; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 2px; margin-top: 6px; }

  /* ── PROGRESS BAR ── */
  .progress-wrap { margin-bottom: 36px; }
  .progress-labels {
    display: flex; justify-content: space-between;
    font-size: 11px; color: rgba(255,255,255,0.4); margin-bottom: 8px;
    text-transform: uppercase; letter-spacing: 1px;
  }
  .progress-labels span.pct { color: var(--gold); }
  .progress-track {
    height: 10px; background: rgba(255,255,255,0.08); border-radius: 99px; overflow: hidden;
    border: 1px solid rgba(255,255,255,0.1);
  }
  .progress-fill {
    height: 100%; border-radius: 99px;
    background: linear-gradient(90deg, var(--cyan), var(--pink), var(--gold));
    box-shadow: 0 0 16px var(--pink), 0 0 30px var(--cyan)66;
    animation: fillPulse 2s ease-in-out infinite alternate;
    transition: width 1s ease;
  }
  @keyframes fillPulse {
    0%   { filter: brightness(1); }
    100% { filter: brightness(1.4); }
  }

  /* ── CARDS ── */
  .cards { display: flex; flex-direction: column; gap: 16px; }
  .card {
    border-radius: 20px; padding: 22px 24px;
    backdrop-filter: blur(12px);
    background: rgba(255,255,255,0.04);
    border: 2px solid var(--c, #fff3);
    --c: #fff3;
    animation: neonBorder 3s ease-in-out infinite;
    transition: transform 0.2s;
  }
  .card:hover { transform: translateY(-2px); }
  .card-icon { font-size: 26px; margin-bottom: 8px; }
  .card-title {
    font-size: 10px; text-transform: uppercase; letter-spacing: 3px;
    color: var(--c); font-weight: 700; margin-bottom: 10px;
    text-shadow: 0 0 10px var(--c);
  }
  .card-body {
    font-family: 'Lora', Georgia, serif; font-size: 15px;
    color: rgba(255,255,255,0.9); line-height: 1.65;
  }
  .card-body strong { color: var(--c); }

  /* ── INSTALL BUTTON ── */
  .install-bar {
    text-align: center; margin-bottom: 28px;
    animation: fadeIn 1s ease 2s both;
  }
  @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:none; } }
  .install-btn {
    background: linear-gradient(135deg, var(--purple), var(--pink));
    color: #fff; border: none; border-radius: 50px;
    padding: 12px 28px; font-size: 14px; font-weight: 700;
    cursor: pointer; letter-spacing: 1px;
    box-shadow: 0 0 20px var(--purple)66, 0 0 40px var(--pink)44;
    animation: installPulse 2s ease-in-out infinite alternate;
  }
  @keyframes installPulse {
    0%   { box-shadow: 0 0 20px var(--purple)66; }
    100% { box-shadow: 0 0 40px var(--purple), 0 0 60px var(--pink)88; }
  }
  .install-btn:hover { filter: brightness(1.2); }

  .notif-btn {
    background: linear-gradient(135deg, var(--cyan)99, var(--green)99);
    color: #000; border: none; border-radius: 50px;
    padding: 12px 28px; font-size: 14px; font-weight: 700;
    cursor: pointer; letter-spacing: 1px; margin-left: 10px;
    box-shadow: 0 0 20px var(--cyan)66;
  }
  .notif-btn:disabled { opacity: 0.4; cursor: default; }

  /* ── FREEDOM SCREEN ── */
  .freedom-screen { text-align: center; padding: 40px 0; }
  .freedom-screen h2 {
    font-family: 'Righteous', cursive; font-size: 42px; color: var(--gold);
    animation: titleGlow 1s infinite alternate;
  }

  /* ── LOADING / ERROR ── */
  .loading { text-align: center; color: rgba(255,255,255,0.5); padding: 40px; }
  .loading-spin { font-size: 36px; animation: spin 1.5s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-box {
    text-align: center; color: var(--orange); padding: 20px;
    background: rgba(255,107,107,0.08); border-radius: 12px;
    border: 1px solid var(--orange)44;
  }
  .retry-btn {
    margin-top: 12px; padding: 8px 20px; background: var(--orange);
    color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px;
  }

  /* ── FOOTER ── */
  .footer { text-align: center; margin-top: 52px; color: rgba(255,255,255,0.2); font-size: 13px; }

  /* ── NOTIFICATION STATUS ── */
  .notif-status {
    font-size: 12px; margin-top: 8px; color: rgba(255,255,255,0.4);
    min-height: 18px;
  }
  .notif-status.ok { color: var(--green); }
  .notif-status.err { color: var(--orange); }
</style>
</head>
<body>

<!-- Neon background orbs -->
<div class="neon-bg" id="neonBg"></div>
<div class="light-beam"></div>
<div class="glow-line" style="background: linear-gradient(90deg, transparent, var(--cyan), transparent);"></div>

<!-- Confetti container -->
<div id="confettiContainer"></div>

<div class="app">

  <!-- Header -->
  <div class="header">
    <div class="header-icons">⛏️ 🎉 ⛏️</div>
    <h1>FREEDOM COUNTDOWN</h1>
    <p>Last Day: May 8, 2026 · 5:00 PM</p>
  </div>

  <!-- Install + Notifications -->
  <div class="install-bar" id="installBar" style="display:none">
    <button class="install-btn" id="installBtn">📲 Install App</button>
    <button class="notif-btn" id="notifBtn">🔔 Daily Reminders</button>
    <div class="notif-status" id="notifStatus"></div>
  </div>

  <!-- Countdown -->
  <div id="countdownSection">
    <div class="countdown-row" id="countdownRow"></div>
    <div class="progress-wrap" id="progressWrap"></div>
  </div>

  <!-- Freedom screen (hidden until D-day) -->
  <div class="freedom-screen" id="freedomScreen" style="display:none">
    <div style="font-size:72px">🎊🥳🎊</div>
    <h2>YOU'RE FREE!!!</h2>
    <p style="color:#fff;font-size:18px;margin-top:16px">Dust yourself off and go live your best life, legend. 💎</p>
  </div>

  <!-- Daily Content Cards -->
  <div id="loadingEl" class="loading" style="display:none">
    <div class="loading-spin">⚙️</div>
    <p style="margin-top:12px">Mining today's wisdom from the depths...</p>
  </div>
  <div id="errorEl" class="error-box" style="display:none">
    <p id="errorMsg"></p>
    <button class="retry-btn" onclick="loadContent()">Try Again</button>
  </div>
  <div class="cards" id="cardsEl" style="display:none"></div>

  <div class="footer">
    <div style="font-size:24px;margin-bottom:8px">💎</div>
    The only gold worth mining is your future
  </div>
</div>

<script>
// ─────────────────────────────────────────────
// CONFIG
// ─────────────────────────────────────────────
const TARGET = new Date("2026-05-08T17:00:00");
const CONFETTI_COLORS = ["#FFD700","#FF6B9D","#00F5FF","#BF5FFF","#39FF14","#FF6B6B","#FFEAA7","#DDA0DD"];

// ─────────────────────────────────────────────
// PWA MANIFEST (injected inline, no server needed)
// ─────────────────────────────────────────────
const manifest = {
  name: "Freedom Countdown ⛏️",
  short_name: "Freedom!",
  description: "Counting down to the best day of your career life.",
  start_url: ".",
  display: "standalone",
  background_color: "#0a0015",
  theme_color: "#1a0533",
  orientation: "portrait",
  icons: [
    { src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='32' fill='%231a0533'/%3E%3Ctext y='.85em' font-size='150' x='16'%3E🎉%3C/text%3E%3C/svg%3E", sizes: "192x192", type: "image/svg+xml" },
    { src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='80' fill='%231a0533'/%3E%3Ctext y='.85em' font-size='400' x='40'%3E🎉%3C/text%3E%3C/svg%3E", sizes: "512x512", type: "image/svg+xml" }
  ]
};
const blob = new Blob([JSON.stringify(manifest)], {type: "application/json"});
document.getElementById("manifest-link").href = URL.createObjectURL(blob);

// ─────────────────────────────────────────────
// SERVICE WORKER (inline via blob URL)
// ─────────────────────────────────────────────
const swCode = `
const CACHE = 'freedom-v1';
self.addEventListener('install', e => {
  self.skipWaiting();
});
self.addEventListener('activate', e => {
  clients.claim();
});
self.addEventListener('fetch', e => {
  e.respondWith(fetch(e.request).catch(() => caches.match(e.request)));
});
// Daily notification check
self.addEventListener('notificationclick', e => {
  e.notification.close();
  e.waitUntil(clients.openWindow('/'));
});
`;
if ('serviceWorker' in navigator) {
  const swBlob = new Blob([swCode], {type: 'application/javascript'});
  const swUrl = URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swUrl, {scope: '/'}).catch(() => {});
}

// ─────────────────────────────────────────────
// NEON ORBS
// ─────────────────────────────────────────────
const orbs = [
  { color:'#BF5FFF', size:500, top:'5%',  left:'-10%', dur:'5s' },
  { color:'#00F5FF', size:400, top:'20%', left:'70%',  dur:'7s' },
  { color:'#FF6B9D', size:350, top:'55%', left:'5%',   dur:'4s' },
  { color:'#FFD700', size:300, top:'70%', left:'65%',  dur:'6s' },
  { color:'#39FF14', size:250, top:'35%', left:'40%',  dur:'8s' },
];
const bg = document.getElementById('neonBg');
orbs.forEach(o => {
  const d = document.createElement('div');
  d.className = 'neon-orb';
  d.style.cssText = `width:${o.size}px;height:${o.size}px;background:${o.color};top:${o.top};left:${o.left};--dur:${o.dur}`;
  bg.appendChild(d);
});

// ─────────────────────────────────────────────
// CONFETTI
// ─────────────────────────────────────────────
const confettiEl = document.getElementById('confettiContainer');
for (let i = 0; i < 70; i++) {
  const p = document.createElement('div');
  p.className = 'confetti-piece';
  const size = 6 + Math.random() * 10;
  const isCircle = Math.random() > 0.5;
  p.style.cssText = `
    left:${Math.random()*100}%;
    width:${isCircle ? size : size*0.6}px;
    height:${size}px;
    background:${CONFETTI_COLORS[Math.floor(Math.random()*CONFETTI_COLORS.length)]};
    border-radius:${isCircle?'50%':'2px'};
    animation-duration:${3+Math.random()*5}s;
    animation-delay:${Math.random()*6}s;
    opacity:0.9;
  `;
  confettiEl.appendChild(p);
}

// ─────────────────────────────────────────────
// COUNTDOWN
// ─────────────────────────────────────────────
function getTimeLeft() {
  const diff = TARGET - new Date();
  if (diff <= 0) return null;
  return {
    days:    Math.floor(diff / 864e5),
    hours:   Math.floor((diff % 864e5) / 36e5),
    minutes: Math.floor((diff % 36e5) / 6e4),
    seconds: Math.floor((diff % 6e4) / 1e3),
  };
}

function pad(n) { return String(n).padStart(2,'0'); }

function renderCountdown() {
  const t = getTimeLeft();
  if (!t) {
    document.getElementById('countdownSection').style.display = 'none';
    document.getElementById('freedomScreen').style.display = 'block';
    return;
  }
  const row = document.getElementById('countdownRow');
  row.innerHTML = ['days','hours','minutes','seconds'].map((lbl,i) => `
    <div class="time-box" style="animation-delay:${i*0.6}s">
      <span class="time-val">${pad(t[lbl])}</span>
      <span class="time-lbl">${lbl}</span>
    </div>
  `).join('');

  // Progress bar
  const start = new Date("2026-04-22T00:00:00");
  const total = TARGET - start;
  const elapsed = new Date() - start;
  const pct = Math.min(100, Math.max(0, (elapsed/total)*100)).toFixed(1);
  document.getElementById('progressWrap').innerHTML = `
    <div class="progress-labels">
      <span>Sentence served</span>
      <span class="pct">${pct}% escaped 🚀</span>
      <span>🏁 Freedom</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" style="width:${pct}%"></div>
    </div>
  `;
}

renderCountdown();
setInterval(renderCountdown, 1000);

// ─────────────────────────────────────────────
// PWA INSTALL PROMPT
// ─────────────────────────────────────────────
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installBar').style.display = 'block';
});
document.getElementById('installBtn').addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  if (outcome === 'accepted') {
    document.getElementById('installBtn').textContent = '✅ Installed!';
    document.getElementById('installBtn').disabled = true;
  }
  deferredPrompt = null;
});

// Show install bar anyway so notifications button is accessible on iOS / already-installed
setTimeout(() => {
  if (document.getElementById('installBar').style.display === 'none') {
    document.getElementById('installBar').style.display = 'block';
    document.getElementById('installBtn').style.display = 'none';
  }
}, 2000);

// ─────────────────────────────────────────────
// PUSH NOTIFICATIONS (browser local scheduling)
// ─────────────────────────────────────────────
const notifBtn = document.getElementById('notifBtn');
const notifStatus = document.getElementById('notifStatus');

function scheduleNotification() {
  const t = getTimeLeft();
  if (!t) return;
  const daysLeft = t.days;
  // Schedule for tomorrow 9am
  const tomorrow = new Date();
  tomorrow.setDate(tomorrow.getDate() + 1);
  tomorrow.setHours(9, 0, 0, 0);
  const delay = tomorrow - new Date();

  setTimeout(() => {
    if (Notification.permission === 'granted') {
      new Notification('⛏️ Freedom Countdown!', {
        body: `${daysLeft} days to go! You\'re almost out of that mine! 🎉`,
        icon: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%231a0533'/%3E%3Ctext y='.9em' font-size='80' x='10'%3E🎉%3C/text%3E%3C/svg%3E",
        badge: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='80'%3E⛏️%3C/text%3E%3C/svg%3E",
        tag: 'freedom-daily',
      });
      scheduleNotification(); // reschedule for next day
    }
  }, delay);
}

notifBtn.addEventListener('click', async () => {
  if (!('Notification' in window)) {
    notifStatus.textContent = "Your browser doesn't support notifications.";
    notifStatus.className = 'notif-status err';
    return;
  }
  const perm = await Notification.requestPermission();
  if (perm === 'granted') {
    notifStatus.textContent = '✅ Daily reminders set for 9am!';
    notifStatus.className = 'notif-status ok';
    notifBtn.textContent = '🔔 Reminders On!';
    notifBtn.disabled = true;
    localStorage.setItem('notificationsEnabled', 'true');
    scheduleNotification();
    // Send a test one after 3s
    setTimeout(() => {
      const t = getTimeLeft();
      new Notification('⛏️ Freedom Countdown activated!', {
        body: `${t?.days ?? 0} days left. See you on the other side! 🎊`,
        tag: 'freedom-test',
      });
    }, 3000);
  } else {
    notifStatus.textContent = 'Permission denied. You can enable in browser settings.';
    notifStatus.className = 'notif-status err';
  }
});

// Re-arm notifications if previously enabled
if (localStorage.getItem('notificationsEnabled') === 'true' && Notification.permission === 'granted') {
  notifBtn.textContent = '🔔 Reminders On!';
  notifBtn.disabled = true;
  notifStatus.textContent = '✅ Daily reminders active at 9am';
  notifStatus.className = 'notif-status ok';
  scheduleNotification();
}

// ─────────────────────────────────────────────
// DAILY CONTENT via Claude API
// ─────────────────────────────────────────────
function getTodayKey() {
  const d = new Date();
  return `freedom-${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
}

const CARD_DEFS = [
  { key:'oneliner',    emoji:'💬', title:"Today's One-Liner",          color:'#FFD700' },
  { key:'song',        emoji:'🎵', title:'Song of the Day',             color:'#00F5FF' },
  { key:'affirmation', emoji:'✨', title:'Words of Affirmation',        color:'#DDA0DD' },
  { key:'legend',      emoji:'🚀', title:'Late Bloomers & Legends',     color:'#FF6B9D' },
  { key:'rockclock',   emoji:'🪨', title:'Rock Bottom? Not Anymore.',   color:'#96CEB4' },
];

function renderCards(data) {
  const cardsEl = document.getElementById('cardsEl');
  cardsEl.innerHTML = CARD_DEFS.map(def => {
    let body = '';
    if (def.key === 'song' && data.song) {
      body = `<strong>${data.song.title}</strong> — ${data.song.artist}<br><span style="opacity:0.75;font-size:14px">${data.song.reason}</span>`;
    } else if (def.key === 'legend' && data.legend) {
      body = `<strong style="font-size:16px">${data.legend.name}</strong><br><span style="opacity:0.7;font-size:12px;letter-spacing:1px;text-transform:uppercase">${data.legend.former} → ${data.legend.became}</span><br><br>${data.legend.story}`;
    } else {
      body = data[def.key] || '';
    }
    return `
      <div class="card" style="--c:${def.color}; animation-delay:${CARD_DEFS.indexOf(def)*0.4}s">
        <div class="card-icon">${def.emoji}</div>
        <div class="card-title">${def.title}</div>
        <div class="card-body">${body}</div>
      </div>
    `;
  }).join('');
  cardsEl.style.display = 'flex';
}

async function loadContent() {
  const key = getTodayKey();
  const cached = localStorage.getItem(key);
  if (cached) {
    try { renderCards(JSON.parse(cached)); return; } catch {}
  }

  document.getElementById('loadingEl').style.display = 'block';
  document.getElementById('errorEl').style.display = 'none';
  document.getElementById('cardsEl').style.display = 'none';

  const daysLeft = getTimeLeft()?.days ?? 0;

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1200,
        system: `You are a hilarious, warm hype-person helping someone count down their final days at a toxic gold mine where they worked as a geology superintendent. They escape to freedom on May 8, 2026. Use mining/geology puns where possible. Return ONLY valid JSON, no markdown, no backticks, no extra text.`,
        messages: [{
          role: "user",
          content: `${daysLeft} days remain until freedom (May 8, 2026). Return a JSON object with EXACTLY these keys:

"oneliner": A punchy, hilarious one-liner about escaping a toxic job. Geology/mining pun encouraged.

"song": { "title": song name, "artist": artist name, "reason": 1-2 funny sentences on why it fits leaving a toxic mine }

"affirmation": 2-3 warm, genuine sentences celebrating their courage and bright future ahead.

"legend": { "name": a real famous person who made a major career change in midlife and found huge success, "former": their old career/role in 3-5 words, "became": what they became in 3-5 words, "story": 2-3 inspiring sentences about their transformation — be specific and accurate }

"rockclock": A geology/mining pun or joke that ties into freedom. Short and punchy.

JSON only. No other text.`
        }]
      })
    });

    const data = await res.json();
    const raw = (data.content || []).find(b => b.type === 'text')?.text || '';
    const clean = raw.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);
    localStorage.setItem(key, JSON.stringify(parsed));
    document.getElementById('loadingEl').style.display = 'none';
    renderCards(parsed);
  } catch (e) {
    document.getElementById('loadingEl').style.display = 'none';
    document.getElementById('errorMsg').textContent = "Couldn't load today's content. The mine's wifi is at it again.";
    document.getElementById('errorEl').style.display = 'block';
  }
}

loadContent();
</script>
